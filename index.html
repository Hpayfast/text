<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan to Pay (Demo)</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:360px;
background:#fff;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
padding:20px;
text-align:center;
}

.header{
background:#00A651;
color:#fff;
padding:15px;
border-radius:15px;
font-size:28px;
font-weight:bold;
}

.timer{
font-size:30px;
font-weight:bold;
color:#ff6a00;
margin:20px 0;
}

.name{
font-size:24px;
font-weight:bold;
margin:10px 0;
}

.amount{
font-size:36px;
font-weight:bold;
color:red;
margin-bottom:20px;
}

.info{
background:#f7f7f7;
padding:12px;
border-radius:10px;
text-align:left;
line-height:2;
font-size:15px;
}

.copy-btn{
background:#00A651;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
margin-left:5px;
}

.copy-btn:active{
transform:scale(.95);
}

.whatsapp{
margin-top:15px;
background:#25D366;
color:#fff;
padding:12px;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

.note{
margin-top:12px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
Scan to Pay
</div>

<div class="timer" id="timer">
10:00
</div>

<div class="name">
Raja Umar
</div>

<div class="amount">
Rs. 2,000
</div>

<div class="info">

<b>Bank:</b> EASYPAISA<br>

<b>Account:</b> 
<span id="account">03118992626</span>
<button class="copy-btn" onclick="copyText('account')">
Copy
</button>
<br>

<b>IBAN:</b>
<span id="iban">PK47TMFB0000000057837487</span>
<button class="copy-btn" onclick="copyText('iban')">
Copy
</button>

</div>


<div class="whatsapp">
WhatsApp: 03118992626
</div>

<div class="note">
Demo Payment Page
</div>

</div>


<script>

let t=600;

setInterval(function(){
if(t>0)t--;

let m=Math.floor(t/60);
let s=t%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

},1000);


function copyText(id){

let text=document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

alert("Copied: "+text);

}

</script>

</body>
</html>
