<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raja Nain - Scan to Pay</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#fff;
width:360px;
padding:25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
text-align:center;
}

h2{
font-size:30px;
color:#222;
margin-bottom:8px;
}

.subtitle{
color:#666;
margin-bottom:20px;
font-size:15px;
}

.box{
background:#f3f3f3;
padding:14px;
border-radius:10px;
margin-top:12px;
font-size:18px;
word-break:break-word;
}

.amount{
font-size:28px;
font-weight:bold;
color:#16a34a;
margin-top:5px;
}
.subtitle{
font-size:15px;
color:#666;
margin-bottom:20px;
}

img{
width:220px;
height:220px;
margin:20px auto;
display:block;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#16a34a;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.note{
margin-top:18px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="card">

<h2>Raja Nain</h2>

<div class="subtitle">
Scan the QR code below to make a payment.
</div>

<div class="box">
<b>Amount Due</b>
<div class="amount">₹15,600</div>
</div>

<div class="box">
<b>EasyPaisa Number</b><br>
<span id="number">03118992626</span>
</div>

<button onclick="copyNumber()">📋 Copy Number</button>

<img src="qr.png" alt="EasyPaisa QR">
<div class="note">
Please verify the recipient details before sending your payment.
</div>

</div>

<script>
function copyNumber() {
  const number = document.getElementById("number").innerText;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(number).then(() => {
      alert("EasyPaisa number copied successfully.");
    });
  } else {
    const input = document.createElement("input");
    input.value = number;
    document.body.appendChild(input);
    input.select();
    document.execCommand("copy");
    document.body.removeChild(input);
    alert("EasyPaisa number copied successfully.");
  }
}
</script>
</body>
</html>
