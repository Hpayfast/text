<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ready to Pay</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:360px;
background:#fff;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
padding:20px;
text-align:center;
}

.timer{
font-size:30px;
font-weight:bold;
color:#ff6a00;
margin:10px 0 20px;
}

.name{
font-size:24px;
font-weight:bold;
margin:10px 0;
}

.amount{
font-size:36px;
font-weight:bold;
color:red;
margin-bottom:10px;
}

.easypaisa{
font-size:23px;
font-weight:bold;
color:#00A651;
font-family:Georgia,serif;
letter-spacing:1px;
margin-bottom:20px;
}

.box{
background:#f7f7f7;
padding:15px;
border-radius:12px;
margin-bottom:15px;
font-size:16px;
}

.number{
font-weight:bold;
font-size:18px;
margin:10px 0;
word-break:break-all;
}

.copy-btn{
background:#00A651;
color:white;
border:none;
padding:9px 25px;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.copy-btn.done{
background:#28a745;
transform:scale(1.1);
}

.whatsapp-btn{
display:block;
margin-top:20px;
background:#25D366;
color:white;
text-decoration:none;
padding:13px;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

.note{
margin-top:12px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<div class="timer" id="timer">
10:00
</div>

<div class="name">
Usama please pay
</div>

<div class="amount">
Rs. 2,000
</div>

<div class="easypaisa">
Easypaisa Payment
</div>


<div class="box">
<b>Account Number</b>

<div class="number" id="account">
03118992626
</div>

<button class="copy-btn" onclick="copyText('account',this)">
Copy
</button>
</div>


<div class="box">
<b>IBAN</b>

<div class="number" id="iban">
PK47TMFB0000000057837487
</div>

<button class="copy-btn" onclick="copyText('iban',this)">
Copy
</button>
</div>


<a class="whatsapp-btn" 
href="https://wa.me/923118992626?text=Hello%20Raja%20Umar%20I%20have%20completed%20the%20payment" 
target="_blank">
WhatsApp Confirmation
</a>


<div class="note">
Payment Page
</div>

</div>


<script>

let t=600;

setInterval(function(){

if(t>0)t--;

let m=Math.floor(t/60);
let s=t%60;

document.getElementById("timer").innerHTML =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

},1000);



function copyText(id,btn){

let text=document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

btn.innerHTML="✓ Copied";

btn.classList.add("done");


setTimeout(function(){

btn.innerHTML="Copy";
btn.classList.remove("done");

},1500);

}

</script>

</body>
</html>
